<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
        <title>Blog Layout</title>
        <link rel="stylesheet" href="css/styles.css">
    </head>

    <body>
        <header class="header">
            <h1>MY BLOG</h1>
        </header>

        <nav class="navbar">
            <a href="#">HOME</a>
            <a href="#">TECH</a>
            <a href="#">DESIGN</a>
            <a href="#">CONTACT</a>
        </nav>

        <div class="container">
            <main class="main-content">

                <article class="hero-post">
                    <h2>Featured Post</h2>
                    <p>This is the main highlighted article</p>
                </article>

                <section class="posts" id="posts">
                    <!-- JS will render -->
                </section>
            </main>

            <aside class="sidebar">
                <h3>ABOUT</h3>
                <p>
                    welcome to my blog where i shar knowledge.
                </p>
                
                <h3>Categories</h3>
                <ul>
                    <li>TECH</li>
                    <li>DESIGN</li>
                    <li>LIFE</li>
                </ul>
            </aside>

        </div>
        <script src="js/script.js"></script>
    </body>
</html>
