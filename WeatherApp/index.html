<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width initial-scale=1.0">
        <title>Weather App</title>

        <link rel="stylesheet" href="css/styles.css">
    </head>

    <body>
        <div class="container">
            <h1>WEATHER APP</h1>
            <div id="searchbox" class="searchbox">
                <input type="text" placeholder="Search location here..." class="inputlocation">
                <p id="searchicon"></p>       
            </div>

            <p id="status"></p>

            <div id="weatherresult" class="hidden">
                <h2 id="cityname"></h2>
                <p id="temperature"></p>
                <p id="desc"></p>
            </div>
        </div>
        <script src="js/script.js"></script>
    </body>
</html>
