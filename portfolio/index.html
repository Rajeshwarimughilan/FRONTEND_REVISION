<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Portfolio</title>

        <link rel="stylesheet" href="css/styles.css">
    </head>

    <body>
        <!--HEADER-->
        <header class="header">
            <nav class="navbar">
                <h1 class="logo">Portfolio</h1>

                <ul class="nav-links">
                    <li><a href="#home">HOME</a></li>
                    <li><a href="#about">ABOUT</a></li>
                    <li><a href="#projects">PROJECTS</a></li>
                    <li><a href="#contact">CONTACT</a></li>
                </ul>
            </nav>
        </header>

        <!--HERO SECTION-->
        <section id="home" class="hero">
            <h2>Hello, I'm Rajeshwari</h2>
            <p>A passionate IT student & developer</p>
            <button id="hireme">HIRE ME</button>
        </section>

        <!--ABOUT-->
        <section id="about" class="about">
            <h2>About Me</h2>
            <p>
                I'm currently pursuing Information Technology. my interest is Frontend Development.I love exploring new upcoming technologies.
            </p>
        </section>

        <!--PROJECT-->
        <section id="projects" class="projects">
            <h2>PROJECTS</h2>

            <div class="project-container" id="projectcontainer">
                <!--js will insert projects here-->
            </div>

            <p id="emptystate" class="hidden">
                No Projects Available.
            </p>
        </section>

        <!--CONTACT-->
        <section id="contact" class="contact">
            <h2> Contact Me</h2>

            <form id="contactform">
                <input type="text" id="name" placeholder="Youe Name" required>
                <input type="email" id="email" placeholder="Your Email">
                <textarea id="message" placeholder="Your Message"></textarea>
                <button id="submit">SEND</button>
            </form>

            <p id="formstatus"></p>
        </section>
        
        <!--Link Javascript-->
        <script src="js/script.js"></script>
    </body>
</html>
